<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Riwayat Hidup</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1e5ba8;
            --secondary-color: #2d7bc9;
            --bg-color: #f5f8fa;
            --text-color: #333333;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 80px);
        }

        /* Page 1 Styles */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 60px 40px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-top: 40px;
        }

        .hero-title {
            font-size: 3em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .input-group {
            margin: 30px 0;
        }

        .input-field {
            width: 100%;
            max-width: 500px;
            padding: 18px 25px;
            font-size: 1.2em;
            border: 3px solid var(--secondary-color);
            border-radius: 30px;
            outline: none;
            transition: all 0.3s;
            margin: 0 auto;
            display: block;
        }

        .input-field:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(30, 91, 168, 0.3);
        }

        .btn {
            padding: 16px 50px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 6px 20px rgba(30, 91, 168, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(30, 91, 168, 0.5);
        }

        .btn-download {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            min-width: 200px;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.5);
        }

        /* Header Controls */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px 30px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .translate-selector, .theme-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .translate-selector select, .theme-selector select {
            padding: 10px 20px;
            border: 2px solid var(--secondary-color);
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            outline: none;
        }

        .time-display {
            display: flex;
            gap: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .time-box {
            background: var(--bg-color);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.95em;
        }

        /* Page 2 Styles */
        .form-container {
            background: white;
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .section-title {
            background: var(--primary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 1.4em;
            font-weight: bold;
            margin: 25px 0 20px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.05em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="date"],
        .form-group textarea,
        .form-group select {
            padding: 14px 18px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 10px rgba(45, 123, 201, 0.2);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker {
            width: 35px;
            height: 35px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
        }

        /* Radio Button Group */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: 2px solid var(--secondary-color);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-option:hover {
            background: var(--bg-color);
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Photo Upload */
        .photo-upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .photo-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 6px solid var(--primary-color);
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #6B8E23 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-circle:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(30, 91, 168, 0.3);
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .upload-btn {
            background: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        #photoInput {
            display: none;
        }

        /* Dynamic Fields */
        .dynamic-fields {
            margin: 20px 0;
        }

        .field-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 15px;
            margin-bottom: 15px;
            align-items: end;
        }

        .add-remove-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-add {
            background: #28a745;
            color: white;
        }

        .btn-add:hover {
            background: #218838;
        }

        .btn-remove {
            background: #dc3545;
            color: white;
        }

        .btn-remove:hover {
            background: #c82333;
        }

        /* Download Section */
        .download-section {
            margin-top: 40px;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: var(--border-radius);
        }

        .download-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 25px;
            background: rgba(255,255,255,0.95);
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        /* Preview Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #666;
        }

        .preview-canvas {
            border: 2px solid #ddd;
            border-radius: 10px;
            max-width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2em;
            }
            
            .header-controls {
                flex-direction: column;
                text-align: center;
            }
            
            .time-display {
                flex-direction: column;
                gap: 10px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .field-row {
                grid-template-columns: 1fr;
            }
            
            .download-buttons {
                flex-direction: column;
            }
            
            .btn-download {
                width: 100%;
            }
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Controls -->
        <div class="header-controls">
            <div class="translate-selector">
                <label>🌐 Translate:</label>
                <select id="languageSelector" onchange="changeLanguage(this.value)">
                    <option value="id">🇮🇩 Bahasa Indonesia</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="ja">🇯🇵 日本語</option>
                </select>
            </div>

            <div class="time-display">
                <div class="time-box">
                    🕐 Jakarta: <span id="jakartaTime">--:--:--</span>
                </div>
                <div class="time-box">
                    🗾 Tokyo: <span id="tokyoTime">--:--:--</span>
                </div>
            </div>

            <div class="theme-selector">
                <label>🎨 Theme:</label>
                <select id="themeSelector" onchange="changeTheme(this.value)">
                    <option value="#1e5ba8">Biru (Default)</option>
                    <option value="#e74c3c">Merah</option>
                    <option value="#27ae60">Hijau</option>
                    <option value="#f39c12">Kuning</option>
                    <option value="#8e44ad">Ungu</option>
                    <option value="#16a085">Tosca</option>
                    <option value="#e67e22">Oranye</option>
                    <option value="#000000">Hitam</option>
                </select>
            </div>
        </div>

        <!-- PAGE 1: Hero / Input Nama -->
        <div id="page1" class="page active">
            <div class="hero-section">
                <h1 class="hero-title" data-translate="mainTitle">Daftar Riwayat Hidup</h1>
                
                <div class="input-group">
                    <input type="text" 
                           id="namaInput" 
                           class="input-field" 
                           placeholder="Masukkan Nama Lengkap Anda..."
                           data-placeholder-translate="namaPlaceholder"
                           data-translate-label="namaLabel">
                </div>

                <button class="btn btn-primary" onclick="goToPage2()" data-translate="nextBtn">
                    BERIKUTNYA →
                </button>
            </div>
        </div>

        <!-- PAGE 2: Form Lengkap -->
        <div id="page2" class="page">
            <div class="form-container">
                <!-- Data Pribadi Section -->
                <div class="section-title">
                    <span class="section-icon">👤</span>
                    <span data-translate="dataPribadiTitle">Data Pribadi</span>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>
                            <span data-translate="namaLabel">Nama</span>
                            <div class="color-picker-wrapper">
                                <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('nama', this.value)">
                            </div>
                        </label>
                        <input type="text" id="nama" data-translate-placeholder="namaPlaceholder" style="color: #333333;">
                    </div>

                    <div class="form-group">
                        <label>
                            <span data-translate="tanggalLahirLabel">Tanggal Lahir</span>
                            <div class="color-picker-wrapper">
                                <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('tanggalLahir', this.value)">
                            </div>
                        </label>
                        <input type="date" id="tanggalLahir" style="color: #333333;">
                    </div>

                    <div class="form-group">
                        <label>
                            <span data-translate="alamatLabel">Alamat</span>
                            <div class="color-picker-wrapper">
                                <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('alamat', this.value)">
                            </div>
                        </label>
                        <textarea id="alamat" rows="3" data-translate-placeholder="alamatPlaceholder" style="color: #333333;"></textarea>
                    </div>

                    <div class="form-group">
                        <label>
                            <span data-translate="emailLabel">Email</span>
                            <div class="color-picker-wrapper">
                                <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('email', this.value)">
                            </div>
                        </label>
                        <input type="email" id="email" data-translate-placeholder="emailPlaceholder" style="color: #333333;">
                    </div>

                    <div class="form-group">
                        <label>
                            <span data-translate="statusLabel">Status Pernikahan</span>
                            <div class="color-picker-wrapper">
                                <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('status', this.value)">
                            </div>
                        </label>
                        <div class="radio-group">
                            <label class="radio-option" onclick="selectStatus(this, 'Menikah')">
                                <input type="radio" name="status" value="Menikah">
                                <span data-translate="menikah">MENIKAH</span>
                            </label>
                            <label class="radio-option" onclick="selectStatus(this, 'Belum Menikah')">
                                <input type="radio" name="status" value="Belum Menikah">
                                <span data-translate="belumMenikah">BELUM MENIKAH</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Upload Foto -->
                <div class="section-title">
                    <span class="section-icon">📷</span>
                    <span data-translate="uploadFotoTitle">Upload Gambar</span>
                </div>

                <div class="photo-upload-container">
                    <div class="photo-circle" onclick="document.getElementById('photoInput').click()">
                        <img id="photoPreview" src="" alt="" class="hidden">
                        <div id="photoPlaceholder" class="photo-placeholder">
                            UPLOAD GAMBAR<br><small>(Max 5MB)</small>
                        </div>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
                    <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
                        📁 Pilih Foto
                    </button>
                </div>

                <!-- Organisasi Section -->
                <div class="section-title">
                    <span class="section-icon">🏢</span>
                    <span data-translate="organisasiTitle">Organisasi</span>
                </div>

                <div id="organisasiContainer" class="dynamic-fields">
                    <div class="field-row organisasi-row">
                        <div class="form-group">
                            <label>
                                <span data-translate="organisasi1Label">ORGANISASI 1</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('organisasi1', this.value)">
                                </div>
                            </label>
                            <input type="text" id="organisasi1" data-translate-placeholder="organisasiPlaceholder" style="color: #333333;">
                        </div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
                <button class="btn-add add-remove-btn" onclick="addOrganisasi()" data-translate="tambahOrganisasi">+ Tambah Organisasi</button>

                <!-- Hobi Section -->
                <div class="section-title">
                    <span class="section-icon">⚽</span>
                    <span data-translate="hobiTitle">Hobi</span>
                </div>

                <div id="hobiContainer" class="dynamic-fields">
                    <div class="form-grid hobi-grid">
                        <div class="form-group hobi-item">
                            <label>
                                <span data-translate="hobi1Label">HOBI 1</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('hobi1', this.value)">
                                </div>
                            </label>
                            <input type="text" id="hobi1" data-translate-placeholder="hobiPlaceholder" style="colour: #333333;">
                        </div>
                        <div class="form-group hobi-item">
                            <label>
                                <span data-translate="hobi2Label">HOBI 2</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('hobi2', this.value)">
                                </div>
                            </label>
                            <input type="text" id="hobi2" data-translate-placeholder="hobiPlaceholder" style="color: #333333;">
                        </div>
                    </div>
                </div>
                <button class="btn-add add-remove-btn" onclick="addHobi()" data-translate="tambahHobi">+ Tambah Hobi</button>

                <!-- Pendidikan Section -->
                <div class="section-title">
                    <span class="section-icon">🎓</span>
                    <span data-translate="pendidikanTitle">Pendidikan</span>
                </div>

                <div id="pendidikanContainer" class="dynamic-fields">
                    <!-- SD -->
                    <div class="field-row pendidikan-row" data-level="sd">
                        <div class="form-group">
                            <label>
                                <span data-translate="riwayatSDLabel">RIWAYAT SD</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('riwayatSD', this.value)">
                                </div>
                            </label>
                            <input type="text" id="riwayatSD" data-translate-placeholder="riwayatPlaceholder" style="color: #333333;">
                        </div>
                        <div class="form-group">
                            <label>
                                <span data-translate="lamaSDLabel">LAMA SD</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('lamaSD', this.value)">
                                </div>
                            </label>
                            <input type="text" id="lamaSD" placeholder="Contoh: 2005-2011" style="color: #333333;">
                        </div>
                        <div></div>
                    </div>

                    <!-- SMP -->
                    <div class="field-row pendidikan-row" data-level="smp">
                        <div class="form-group">
                            <label>
                                <span data-translate="riwayatSMPLabel">RIWAYAT SMP</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('riwayatSMP', this.value)">
                                </div>
                            </label>
                            <input type="text" id="riwayatSMP" data-translate-placeholder="riwayatPlaceholder" style="color: #333333;">
                        </div>
                        <div class="form-group">
                            <label>
                                <span data-translate="lamaSMPLabel">LAMA SMP</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('lamaSMP', this.value)">
                                </div>
                            </label>
                            <input type="text" id="lamaSMP" placeholder="Contoh: 2011-2014" style="color: #333333;">
                        </div>
                        <div></div>
                    </div>

                    <!-- SMA -->
                    <div class="field-row pendidikan-row" data-level="sma">
                        <div class="form-group">
                            <label>
                                <span data-translate="riwayATALabel">RIWAYAT SMA</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('riwayatSMA', this.value)">
                                </div>
                            </label>
                            <input type="text" id="riwayatSMA" data-translate-placeholder="riwayatPlaceholder" style="color: #333333;">
                        </div>
                        <div class="form-group">
                            <label>
                                <span data-translate="lamaSMALabel">LAMA SMA</span>
                                <div class="color-picker-wrapper">
                                    <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('lamaSMA', this.value)">
                                </div>
                            </label>
                            <input type="text" id="lamaSMA" placeholder="Contoh: 2014-2017" style="color: #333333;">
                        </div>
                        <div></div>
                    </div>
                </div>

                <div style="margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-add add-remove-btn" onclick="addPendidikan('d1d3')" data-translate="tambahD1D3">+ Tambah D1-D3</button>
                    <button class="btn-add add-remove-btn" onclick="addPendidikan('d4s1')" data-translate="tambahD4S1">+ Tambah D4/S1</button>
                    <button class="btn-add add-remove-btn" onclick="addPendidikan('s2')" data-translate="tambahS2">+ Tambah S2</button>
                    <button class="btn-add add-remove-btn" onclick="addPendidikan('s3')" data-translate="tambahS3">+ Tambah S3</button>
                </div>

                <!-- Download Section -->
                <div class="download-section">
                    <h2 data-translate="unduhTitle">Unduh Daftar Riwayat Hidup</h2>

        // ==================== TIME FUNCTIONS ====================
        function updateClock() {
            const now = new Date();
            
            // Jakarta Time (WIB - UTC+7)
            const jakarta = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }));
            document.getElementById('jakartaTime').textContent = jakarta.toLocaleTimeString('id-ID');
            
            // Tokyo Time (JST - UTC+9)
            const tokyo = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
            document.getElementById('tokyoTime').textContent = tokyo.toLocaleTimeString('ja-JP');
        }

        setInterval(updateClock, 1000);
        updateClock();

        // ==================== LANGUAGE FUNCTIONS ====================
        function changeLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];
            
            // Update all translatable elements
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            // Update placeholders
            document.querySelectorAll('[data-translate-placeholder]').forEach(el => {
                const key = el.getAttribute('data-translate-placeholder');
                if (t[key]) {
                    el.placeholder = t[key];
                }
            });
        }

        // ==================== THEME FUNCTIONS ====================
        function changeTheme(color) {
            currentTheme = color;
            document.documentElement.style.setProperty('--primary-color', color);
            
            // Adjust secondary color
            const secondaryColor = adjustColor(color, 20);
            document.documentElement.style.setProperty('--secondary-color', secondaryColor);
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + amount);
            const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + amount);
            const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + amount);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // ==================== FIELD COLOR FUNCTIONS ====================
        function updateFieldColor(fieldId, color) {
            fieldColors[fieldId] = color;
            const element = document.getElementById(fieldId);
            if (element) {
                element.style.color = color;
            }
        }

        // ==================== NAVIGATION FUNCTIONS ====================
        function goToPage2() {
            const nama = document.getElementById('namaInput').value.trim();
            if (!nama) {
                alert(translations[currentLanguage].namaPlaceholder || 'Silakan masukkan nama!');
                return;
            }
            
            document.getElementById('nama').value = nama;
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            window.scrollTo(0, 0);
        }

        // ==================== STATUS SELECTION ====================
        function selectStatus(element, value) {
            document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            element.querySelector('input[type="radio"]').checked = true;
        }

        // ==================== PHOTO UPLOAD ====================
        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                alert('Ukuran file maksimal 5MB!');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImage = e.target.result;
                const img = document.getElementById('photoPreview');
                img.src = uploadedImage;
                img.classList.remove('hidden');
                document.getElementById('photoPlaceholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function addPendidikan(level) {
            if (pendidikanLevels.includes(level)) {
                alert('Level pendidikan ini sudah ditambahkan!');
                return;
            }
            
            pendidikanLevels.push(level);
            const container = document.getElementById('pendidikanContainer');
            
            const levelConfig = {
                'd1d3': { label: 'riwayatD1D3Label', period: 'lamaD1D3Label', id: 'D1D3' },
                'd4s1': { label: 'riwayatD4S1Label', period: 'lamaD4S1Label', id: 'D4S1' },
                's2': { label: 'riwayatS2Label', period: 'lamaS2Label', id: 'S2' },
                's3': { label: 'riwayatS3Label', period: 'lamaS3Label', id: 'S3' }
            };
            
            const config = levelConfig[level];
            const newRow = document.createElement('div');
            newRow.className = 'field-row pendidikan-row';
            newRow.dataset.level = level;
            newRow.innerHTML = `
                <div class="form-group">
                    <label>
                        <span>${translations[currentLanguage][config.label]}</span>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('riwayat${config.id}', this.value)">
                        </div>
                    </label>
                    <input type="text" id="riwayat${config.id}" placeholder="${translations[currentLanguage].riwayatPlaceholder}" style="color: #333333;">
                </div>
                <div class="form-group">
                    <label>
                        <span>${translations[currentLanguage][config.period]}</span>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" value="#333333" onchange="updateFieldColor('lama${config.id}', this.value)">
                        </div>
                    </label>
                    <input type="text" id="lama${config.id}" placeholder="Contoh: 2017-2021" style="color: #333333;">
                </div>
                <div>
                    <button class="btn-remove add-remove-btn" onclick="removePendidikan(this, '${level}')">−</button>
                </div>
            `;
            container.appendChild(newRow);
            
            // Hide the button for this level
            event.target.style.display = 'none';
        }

        function removePendidikan(btn, level) {
            btn.closest('.field-row').remove();
            const index = pendidikanLevels.indexOf(level);
            if (index > -1) {
                pendidikanLevels.splice(index, 1);
            }
            
            // Show the corresponding add button again
            const buttons = {
                'd1d3': '[onclick="addPendidikan(\'d1d3\')"]',
                'd4s1': '[onclick="addPendidikan(\'d4s1\')"]',
                's2': '[onclick="addPendidikan(\'s2\')"]',
                's3': '[onclick="addPendidikan(\'s3\')"]'
            };
            const addBtn = document.querySelector(buttons[level]);
            if (addBtn) {
                addBtn.style.display = 'inline-block';
            }
        }

        // ==================== PDF GENERATION ====================
        async function previewAndDownload(lang) {
            pendingDownloadLang = lang;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });
            
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const t = translations[lang];
            
            // Background - White
            doc.setFillColor(255, 255, 255);
            doc.rect(0, 0, pageWidth, pageHeight, 'F');
            
            // Blue curved header (similar to template)
            doc.setFillColor(30, 91, 168);
            doc.roundedRect(-10, -10, pageWidth + 20, 80, 0, 0, 'F');
            
            // Title
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(32);
            doc.setFont('helvetica', 'bold');
            doc.text(t.mainTitle, 20, 35);
            
            // Photo circle area
            const photoX = 145;
            const photoY = 45;
            const photoRadius = 28;
            
            // Circle background
            doc.setFillColor(240, 240, 240);
            doc.circle(photoX, photoY, photoRadius, 'F');
            
            // Draw uploaded image in circle if exists
            if (uploadedImage) {
                try {
                    doc.addImage(uploadedImage, 'JPEG', photoX - photoRadius, photoY - photoRadius, photoRadius * 2, photoRadius * 2);
                } catch (e) {
                    console.error('Error adding image:', e);
                }
            } else {
                // Placeholder gradient simulation
                doc.setFillColor(135, 206, 235);
                doc.circle(photoX, photoY - 8, 20, 'F');
                doc.setFillColor(152, 216, 200);
                doc.circle(photoX, photoY + 5, 18, 'F');
                doc.setFillColor(107, 142, 35);
                doc.circle(photoX, photoY + 15, 15, 'F');
                
                doc.setTextColor(51, 51, 51);
                doc.setFontSize(9);
                doc.setFont('helvetica', 'bold');
                doc.text(t.uploadFotoTitle.toUpperCase(), photoX, photoY + 2, { align: 'center' });
            }
            
            // Data Pribadi Section
            let yPos = 95;
            
            // Section header - Data Pribadi
            doc.setFillColor(30, 91, 168);
            doc.roundedRect(20, yPos - 8, 70, 12, 6, 6, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(13);
            doc.text('👤 ' + t.dataPribadiTitle, 26, yPos);
            
            yPos += 15;
            
            // Form fields
            const fields = [
                { label: t.namaLabel, value: document.getElementById('nama')?.value || '', id: 'nama' },
                { label: t.tanggalLahirLabel, value: document.getElementById('tanggalLahir')?.value || '', id: 'tanggalLahir' },
                { label: t.alamatLabel, value: document.getElementById('alamat')?.value || '', id: 'alamat' },
                { label: t.emailLabel, value: document.getElementById('email')?.value || '', id: 'email' },
                { label: t.statusLabel, value: document.querySelector('input[name="status"]:checked')?.value || '', id: 'status' }
            ];
            
            doc.setFontSize(11);
            fields.forEach(field => {
                const fieldColor = fieldColors[field.id] || '#333333';
                const rgb = hexToRgb(fieldColor);
                doc.setTextColor(rgb.r, rgb.g, rgb.b);
                
                doc.setFont('helvetica', 'bold');
                doc.text(field.label + ' :', 30, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(field.value || '-', 85, yPos);
                yPos += 8;
            });
            
            yPos += 10;
            
            // Pendidikan Section
            doc.setFillColor(30, 91, 168);
            doc.roundedRect(20, yPos - 8, 65, 12, 6, 6, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(13);
            doc.text('🎓 ' + t.pendidikanTitle, 26, yPos);
            
            yPos += 15;
            
            const pendidikanFields = [
                { label: t.riwayatSDLabel, value1: document.getElementById('riwayatSD')?.value || '', value2: document.getElementById('lamaSD')?.value || '' },
                { label: t.riwayatSMPLabel, value1: document.getElementById('riwayatSMP')?.value || '', value2: document.getElementById('lamaSMP')?.value || '' },
                { label: t.riwayATALabel, value1: document.getElementById('riwayatSMA')?.value || '', value2: document.getElementById('lamaSMA')?.value || '' }
            ];
            
            // Add dynamic education levels
            if (pendidikanLevels.includes('d1d3')) {
                pendidikanFields.push({ 
                    label: t.riwayatD1D3Label, 
                    value1: document.getElementById('riwayatD1D3')?.value || '', 
                    value2: document.getElementById('lamaD1D3')?.value || '' 
                });
            }
            if (pendidikanLevels.includes('d4s1')) {
                pendidikanFields.push({ 
                    label: t.riwayatD4S1Label, 
                    value1: document.getElementById('riwayatD4S1')?.value || '', 
                    value2: document.getElementById('lamaD4S1')?.value || '' 
                });
            }
            if (pendidikanLevels.includes('s2')) {
                pendidikanFields.push({ 
                    label: t.riwayatS2Label, 
                    value1: document.getElementById('riwayatS2')?.value || '', 
                    value2: document.getElementById('lamaS2')?.value || '' 
                });
            }
            if (pendidikanLevels.includes('s3')) {
                pendidikanFields.push({ 
                    label: t.riwayatS3Label, 
                    value1: document.getElementById('riwayatS3')?.value || '', 
                    value2: document.getElementById('lamaS3')?.value || '' 
                });
            }
            
            doc.setFontSize(10);
            pendidikanFields.forEach((field, idx) => {
                const fieldId = ['riwayatSD', 'riwayatSMP', 'riwayatSMA', 'riwayatD1D3', 'riwayatD4S1', 'riwayatS2', 'riwayatS3'][idx] || '';
                const fieldColor = fieldColors[fieldId] || '#333333';
                const rgb = hexToRgb(fieldColor);
                doc.setTextColor(rgb.r, rgb.g, rgb.b);
                
                doc.setFont('helvetica', 'bold');
                doc.text('• ' + field.label, 30, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(field.value1 || '-', 110, yPos);
                doc.text(field.value2 || '-', 170, yPos);
                yPos += 7;
                
                if (yPos > pageHeight - 40) {
                    doc.addPage();
                    yPos = 20;
                }
            });
            
            yPos += 10;
            
            // Organisasi Section
            if (yPos > pageHeight - 80) {
                doc.addPage();
                yPos = 20;
            }
            
            doc.setFillColor(30, 91, 168);
            doc.roundedRect(20, yPos - 8, 75, 12, 6, 6, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(13);
            doc.text('🏢 ' + t.organisasiTitle, 26, yPos);
            
            yPos += 15;
            
            for (let i = 1; i <= organisasiCount; i++) {
                const orgValue = document.getElementById(`organisasi${i}`)?.value || '';
                const orgColor = fieldColors[`organisasi${i}`] || '#333333';
                const rgb = hexToRgb(orgColor);
                doc.setTextColor(rgb.r, rgb.g, rgb.b);
                
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.text(`• ${t['organisasi' + i + 'Label'] || 'ORGANISASI ' + i}`, 30, yPos);
                doc.setFont('helvetica', 'normal');
                doc.text(orgValue || '-', 110, yPos);
                yPos += 7;
            }
            
            yPos += 10;
            
            // Hobi Section
            if (yPos > pageHeight - 60) {
                doc.addPage();
                yPos = 20;
            }
            
            doc.setFillColor(30, 91, 168);
            doc.roundedRect(20, yPos - 8, 55, 12, 6, 6, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(13);
            doc.text('⚽ ' + t.hobiTitle, 26, yPos);
            
            yPos += 15;
            
            doc.setFontSize(10);
            const hobiGrid = [];
            for (let i = 1; i <= hobiCount; i++) {
                const hobiValue = document.getElementById(`hobi${i}`)?.value || '';
                const hobiColor = fieldColors[`hobi${i}`] || '#333333';
                const rgb = hexToRgb(hobiColor);
                doc.setTextColor(rgb.r, rgb.g, rgb.b);
                
                const xPos = 30 + ((i - 1) % 2) * 80;
                const yBase = yPos + Math.floor((i - 1) / 2) * 7;
                
                doc.setFont('helvetica', 'bold');
                doc.text(`• ${t['hobi' + i + 'Label'] || 'HOBI ' + i}`, xPos, yBase);
                doc.setFont('helvetica', 'normal');
                doc.text(hobiValue || '-', xPos + 35, yBase);
            }
            
            // Show preview modal
            const canvas = document.getElementById('previewCanvas');
            const pdfDataUri = doc.output('datauristring');
            
            // Create image from PDF for preview
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                document.getElementById('previewModal').classList.add('active');
            };
            img.src = pdfDataUri;
            
            // Store PDF for download
            window.pendingPdfDoc = doc;
            window.pendingPdfDataUri = pdfDataUri;
        }

        function closeModal() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function confirmDownload() {
            if (window.pendingPdfDoc) {
                const langNames = { id: 'Indonesia', en: 'English', de: 'Deutsch', ja: 'Japanese' };
                const fileName = `Daftar_Riwayat_Hidup_${langNames[pendingDownloadLang]}_${new Date().toISOString().split('T')[0]}.pdf`;
                window.pendingPdfDoc.save(fileName);
                closeModal();
            }
        }

        // Helper function to convert hex to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 51, g: 51, b: 51 };
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            changeLanguage('id');
        });

        // Close modal when clicking outside
        document.getElementById('previewModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
